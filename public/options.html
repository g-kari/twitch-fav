<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Favorites - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Twitch Favorites 設定</h1>
    
    <div class="section">
      <h2>データ管理</h2>
      <div class="actions">
        <button id="export-btn">設定をエクスポート</button>
        <button id="import-btn">設定をインポート</button>
        <input type="file" id="import-file" accept=".json" style="display: none;">
      </div>
      <div id="status-message"></div>
    </div>

    <div class="section">
      <h2>お気に入りリスト</h2>
      <div id="favorites-list" class="sortable-list">
        <!-- Favorites will be loaded here -->
        <div class="empty-message">お気に入りはまだ追加されていません</div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
